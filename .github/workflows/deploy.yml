name: CI/CD Build & Publish

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./web
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/visitas-web:v1
          # Si quisieras versiones dinámicas usarías :latest o el SHA del commit

      - name: Build y Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/visitas-api:v1